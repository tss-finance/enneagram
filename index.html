<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enneagramm-Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --primary: #2c3e50;
    --accent: #8e44ad;
    --accent-light: #a569bd;
    --bg: #f4f1f8;
    --card: #ffffff;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: #e0d6f0;
    --success: #27ae60;
    --type-colors: #8e44ad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* WELCOME SCREEN */
  #welcome {
    background: linear-gradient(135deg, #2c3e50 0%, #8e44ad 100%);
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .welcome-logo {
    width: 120px; height: 120px;
    margin: 0 auto 30px;
  }
  .welcome-title { color: white; font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; }
  .welcome-sub { color: rgba(255,255,255,0.8); font-size: 1.1rem; margin-bottom: 40px; max-width: 480px; line-height: 1.6; }
  .info-grid {
    display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center;
  }
  .info-card {
    background: rgba(255,255,255,0.15); border-radius: 12px;
    padding: 16px 24px; color: white; min-width: 130px;
  }
  .info-card .num { font-size: 2rem; font-weight: 700; }
  .info-card .lbl { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
  .name-input-wrap { margin-bottom: 30px; }
  .name-input-wrap input {
    padding: 14px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15); color: white; font-size: 1.1rem;
    width: 300px; text-align: center; outline: none;
    placeholder-color: rgba(255,255,255,0.6);
  }
  .name-input-wrap input::placeholder { color: rgba(255,255,255,0.6); }
  .btn-start {
    background: white; color: var(--accent); border: none;
    padding: 16px 48px; border-radius: 30px; font-size: 1.1rem; font-weight: 600;
    cursor: pointer; transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

  /* QUIZ SCREEN */
  #quiz { background: var(--bg); }
  .quiz-header {
    background: var(--primary); color: white;
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .quiz-header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .progress-wrap { flex: 1; }
  .progress-bar-bg {
    background: rgba(255,255,255,0.2); border-radius: 10px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    background: white; height: 100%; border-radius: 10px;
    transition: width .4s ease;
  }
  .progress-text { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
  .quiz-body {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 30px 20px;
  }
  .question-card {
    background: var(--card); border-radius: 20px;
    box-shadow: 0 4px 24px rgba(142,68,173,0.1);
    padding: 40px; max-width: 680px; width: 100%;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .phase-badge {
    display: inline-block; background: var(--bg); color: var(--accent);
    font-size: 0.75rem; font-weight: 600; padding: 4px 12px;
    border-radius: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .question-text {
    font-size: 1.25rem; line-height: 1.6; color: var(--text);
    margin-bottom: 32px; font-weight: 500;
  }
  .likert-labels {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: var(--muted); margin-bottom: 8px;
  }
  .likert-options {
    display: flex; gap: 12px; justify-content: center; margin-bottom: 8px;
  }
  .likert-btn {
    width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--border);
    background: white; cursor: pointer; font-size: 0.9rem; font-weight: 600;
    color: var(--muted); transition: all .2s; display: flex; align-items: center; justify-content: center;
  }
  .likert-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
  .likert-btn.selected {
    background: var(--accent); border-color: var(--accent);
    color: white; transform: scale(1.08);
  }
  .likert-num { font-size: 0.8rem; }
  .nav-row {
    display: flex; justify-content: space-between; align-items: center; margin-top: 28px;
  }
  .btn-nav {
    padding: 10px 24px; border-radius: 20px; border: 2px solid var(--border);
    background: white; color: var(--muted); cursor: pointer; font-size: 0.9rem;
    transition: all .2s;
  }
  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
  .btn-nav.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 600; padding: 10px 32px;
  }
  .btn-nav.primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SECTION TRANSITION */
  .section-break {
    background: var(--card); border-radius: 20px;
    box-shadow: 0 4px 24px rgba(142,68,173,0.1);
    padding: 48px 40px; max-width: 680px; width: 100%;
    text-align: center; animation: fadeUp .3s ease;
  }
  .section-break .icon { font-size: 3rem; margin-bottom: 16px; }
  .section-break h2 { font-size: 1.5rem; margin-bottom: 12px; color: var(--primary); }
  .section-break p { color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

  /* RESULTS SCREEN */
  #results { background: var(--bg); padding: 30px 20px; align-items: center; }
  .results-container { max-width: 760px; width: 100%; }
  .results-header {
    background: linear-gradient(135deg, #2c3e50 0%, #8e44ad 100%);
    border-radius: 20px; padding: 40px; color: white; text-align: center; margin-bottom: 24px;
  }
  .results-header .type-num { font-size: 4rem; font-weight: 700; line-height: 1; }
  .results-header .type-name { font-size: 1.4rem; margin-top: 8px; opacity: 0.9; }
  .results-header .type-sub { font-size: 1rem; opacity: 0.75; margin-top: 6px; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } }
  .result-card {
    background: var(--card); border-radius: 16px;
    padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .result-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }
  .result-card .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .result-card .desc { font-size: 0.85rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .score-bars { margin-top: 12px; }
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .score-label { font-size: 0.8rem; width: 60px; color: var(--text); }
  .score-bar-bg { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .6s ease; }
  .score-pct { font-size: 0.75rem; color: var(--muted); width: 32px; text-align: right; }
  .stress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .stress-item { display: flex; align-items: center; justify-content: space-between; }
  .stress-name { font-size: 0.8rem; color: var(--muted); }
  .stress-val {
    font-size: 0.75rem; font-weight: 600; padding: 2px 8px;
    border-radius: 10px;
  }
  .stress-val.low { background: #d5f5e3; color: #1e8449; }
  .stress-val.mid { background: #fef9e7; color: #d4ac0d; }
  .stress-val.high { background: #fdebd0; color: #e67e22; }
  .btn-pdf {
    width: 100%; padding: 18px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #2c3e50 0%, #8e44ad 100%);
    color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(142,68,173,0.3);
    transition: opacity .2s, transform .2s;
  }
  .btn-pdf:hover { opacity: 0.9; transform: translateY(-2px); }
  .btn-restart {
    width: 100%; padding: 14px; border-radius: 16px;
    border: 2px solid var(--border); background: white;
    color: var(--muted); font-size: 1rem; cursor: pointer; margin-top: 12px;
    transition: all .2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }

  /* SVG Enneagramm */
  .ennea-svg-wrap { text-align: center; margin-bottom: 24px; }
</style>
</head>
<body>

<!-- ═══════════════ WELCOME ═══════════════ -->

  </div>
  <button class="btn-start" onclick="startQuiz()">Test starten →</button>
</div>

<!-- ═══════════════ QUIZ ═══════════════ -->
<div id="quiz" class="screen">

      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">Frage 1 von …</div>
    </div>
  </div>
  <div class="quiz-body">
    <div id="questionContainer"></div>
  </div>
</div>

<!-- ═══════════════ RESULTS ═══════════════ -->
<div id="results" class="screen">
  <div class="results-container">
    <div class="results-header" id="resultsHeader"></div>
    <div class="ennea-svg-wrap" id="enneasvg"></div>
    <div class="results-grid" id="resultsGrid"></div>
    <button class="btn-pdf" onclick="generatePDF()">📄 PDF-Report herunterladen</button>
    <button class="btn-restart" onclick="restart()">↩ Neu starten</button>
  </div>
</div>

let state = {
  userName: "",
  currentQ: 0,
  questions: [],
  answers: {},
  phase: "core", // core | discriminate | subtype | center | stress | done
  topCandidates: [],
  results: null,
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestionList() {
  // Phase 1: 8 questions per type (72 total), shuffled within type groups
  const coreQs = [];
  for (let t = 1; t <= 9; t++) {
    const tQs = shuffle(ALL_QUESTIONS.filter(q => q.type === t)).slice(0, 8);
    coreQs.push(...tQs);
  }
  // Shuffle all core questions
  const shuffledCore = shuffle(coreQs);

  // Subtype questions (all 9)
  const subtypeQs = shuffle(ALL_QUESTIONS.filter(q => q.subtype));

  // Center questions (all 6)
  const centerQs = shuffle(ALL_QUESTIONS.filter(q => q.center));

  // Stress/wellbeing (all 7)
  const stressQs = ALL_QUESTIONS.filter(q => q.stress);

  return [...shuffledCore, ...subtypeQs, ...centerQs, ...stressQs];
}

function getPhaseLabel(q) {
  if (q.type) return "Persönlichkeitsstil";
  if (q.subtype) return "Instinktiver Antrieb";
  if (q.center) return "Wie andere dich erleben";
  if (q.stress) return "Aktuelle Lebenssituation";
  return "Enneagramm-Test";
}

// ══════════════════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════════════════
function computeResults() {
  const typeScores = {};
  for (let t = 1; t <= 9; t++) typeScores[t] = { sum: 0, count: 0 };

  const subtypeScores = { SP: 0, SX: 0, SO: 0 };
  const centerScores = { feeling: 0, thinking: 0, action: 0 };
  const stressScores = {};

  for (const [idx, score] of Object.entries(state.answers)) {
    const q = state.questions[parseInt(idx)];
    if (!q) continue;

    if (q.type) {
      typeScores[q.type].sum += score;
      typeScores[q.type].count++;
    }
    if (q.subtype) subtypeScores[q.subtype] += score;
    if (q.center) centerScores[q.center] += score;
    if (q.stress) stressScores[q.dim] = score;
  }

  // Normalize type scores to 0-100
  const typeNorm = {};
  let maxScore = 0;
  for (let t = 1; t <= 9; t++) {
    const avg = typeScores[t].count ? typeScores[t].sum / typeScores[t].count : 0;
    typeNorm[t] = avg;
    if (avg > maxScore) maxScore = avg;
  }

  // Sort types
  const sortedTypes = Object.entries(typeNorm)
    .sort(([,a],[,b]) => b - a)
    .map(([t, s]) => ({ type: parseInt(t), score: s, pct: maxScore ? Math.round(s / maxScore * 100) : 0 }));

  const mainType = sortedTypes[0].type;

  // Wing: which neighbor scored higher?
  const prev = mainType === 1 ? 9 : mainType - 1;
  const next = mainType === 9 ? 1 : mainType + 1;
  const wing = typeNorm[prev] >= typeNorm[next] ? prev : next;

  // Subtype
  const subtypeSorted = Object.entries(subtypeScores).sort(([,a],[,b]) => b - a);
  const subtype = subtypeSorted[0][0];

  // Center
  const centerSorted = Object.entries(centerScores).sort(([,a],[,b]) => b - a);
  const dominant = centerSorted[0][0];
  const weakest = centerSorted[2][0];

  // Integration (rough: based on self-awareness questions)
  // Use average of types neighboring the main type as proxy
  const integrationScore = Math.min(100, Math.max(0, Math.round((stressScores.psyche || 3) / 5 * 100)));
  const integrationLevel = integrationScore > 66 ? "Hoch" : integrationScore > 33 ? "Mittel" : "Niedrig";

  // Stress profile
  const stressMap = {};
  for (const [dim, sc] of Object.entries(stressScores)) {
    // 5=sehr gut (niedrig belastet), 1=sehr schlecht (hoch belastet)
    stressMap[dim] = sc >= 4 ? "NIEDRIG" : sc >= 3 ? "MITTEL" : "HOCH";
  }

  return {
    mainType,
    sortedTypes,
    wing,
    subtype,
    center: { dominant, weakest },
    integrationLevel,
    stressMap,
    typeNorm,
  };
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  state.userName = document.getElementById('userName').value.trim() || "Anonym";
  state.questions = buildQuestionList();
  state.currentQ = 0;
  state.answers = {};
  showScreen('quiz');
  renderQuestion();
}

  const pct = Math.round(current / total * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Frage ${current + 1} von ${total}`;

  const q = state.questions[current];
  const selectedAnswer = state.answers[current];
  const phaseLabel = getPhaseLabel(q);

  const container = document.getElementById('questionContainer');
  container.innerHTML = `
    <div class="question-card">
      <div class="phase-badge">${phaseLabel}</div>
      <div class="question-text">${q.text}</div>
      <div class="likert-labels">

      </div>

        ${[1,2,3,4,5].map(n => `
          <button class="likert-btn ${selectedAnswer === n ? 'selected' : ''}" onclick="selectAnswer(${n})">
            <span class="likert-num">${n}</span>
          </button>
        `).join('')}
      </div>
      <div class="likert-labels" style="margin-top:4px">

      <div class="nav-row">
        <button class="btn-nav" onclick="prevQuestion()" ${current === 0 ? 'disabled' : ''}>← Zurück</button>
        <button class="btn-nav primary" id="nextBtn" onclick="nextQuestion()" ${selectedAnswer === undefined ? 'disabled' : ''}>
          ${current === total - 1 ? 'Auswerten →' : 'Weiter →'}
        </button>
      </div>
    </div>
  `;
}

function selectAnswer(n) {
  state.answers[state.currentQ] = n;
  renderQuestion();
}

function prevQuestion() {
  if (state.currentQ > 0) {
    state.currentQ--;
    renderQuestion();
  }
}

function nextQuestion() {
  if (state.answers[state.currentQ] === undefined) return;
  if (state.currentQ < state.questions.length - 1) {
    state.currentQ++;
    renderQuestion();
  } else {
    showResults();
  }
}

function buildEnneagramSVG(mainType, sortedTypes) {
  const cx = 160, cy = 160, r = 120;
  const typeScores = {};
  sortedTypes.forEach(s => typeScores[s.type] = s.pct);

  // Positions (type 9 at top)
  const positions = {};
  for (let i = 1; i <= 9; i++) {
    const angleOffset = -90; // type 9 at top
    const typeAngle = ((i - 9) / 9 * 360 + angleOffset) * Math.PI / 180;
    positions[i] = {
      x: cx + r * Math.cos(typeAngle),
      y: cy + r * Math.sin(typeAngle),
    };
  }

  // Inner ring (score-based)
  const innerPoints = [];
  for (let t = 1; t <= 9; t++) {
    const score = (typeScores[t] || 10) / 100;
    const ir = 20 + score * 90;
    const angleOffset = -90;
    const typeAngle = ((t - 9) / 9 * 360 + angleOffset) * Math.PI / 180;
    innerPoints.push({ x: cx + ir * Math.cos(typeAngle), y: cy + ir * Math.sin(typeAngle) });
  }

  const polygon = [...innerPoints, innerPoints[0]].map(p => `${p.x},${p.y}`).join(' ');

  // Enneagram connection lines
  const triangle = [[3,6,9], [9,3]];
  const hexad = [[1,4,2,8,5,7,1]];

  let lines = '';
  // Triangle
  lines += `<polygon points="${[9,3,6].map(t => `${positions[t].x},${positions[t].y}`).join(' ')}" fill="none" stroke="#ddd" stroke-width="1"/>`;
  // Hexad
  [1,4,2,8,5,7,1].reduce((prev, cur) => {
    lines += `<line x1="${positions[prev].x}" y1="${positions[prev].y}" x2="${positions[cur].x}" y2="${positions[cur].y}" stroke="#ddd" stroke-width="1"/>`;
    return cur;
  });

  let dots = '';
  for (let t = 1; t <= 9; t++) {
    const p = positions[t];
    const isMain = t === mainType;
    dots += `
      <circle cx="${p.x}" cy="${p.y}" r="${isMain ? 12 : 8}"
        fill="${isMain ? '#8e44ad' : '#ecf0f1'}"
        stroke="${isMain ? '#6c3483' : '#bdc3c7'}" stroke-width="1.5"/>
      <text x="${p.x}" y="${p.y + 4}" text-anchor="middle" font-size="${isMain ? 9 : 7}"
        font-weight="${isMain ? 'bold' : 'normal'}" fill="${isMain ? 'white' : '#7f8c8d'}">${t}</text>
    `;
  }

  return `
    <svg viewBox="0 0 320 320" width="280" height="280" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ecf0f1" stroke-width="1.5"/>
      <circle cx="${cx}" cy="${cy}" r="${r*0.67}" fill="none" stroke="#f8f4fc" stroke-width="1" stroke-dasharray="3,3"/>
      ${lines}
      <polyline points="${polygon}" fill="rgba(142,68,173,0.15)" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
      ${dots}
      <circle cx="${cx}" cy="${cy}" r="5" fill="#8e44ad"/>
    </svg>
  `;
}

  }).join('')}

  // ── Render report off-screen, capture with html2canvas, export via jsPDF ──
  const pdfBtn = document.querySelector('.btn-pdf');
  pdfBtn.disabled = true;
  pdfBtn.textContent = '⏳ PDF wird erstellt…';

  // Create hidden container
  const wrapper = document.createElement('div');
  wrapper.style.cssText = [
    'position:fixed', 'left:-9999px', 'top:0',
    'width:794px',       // ~A4 at 96dpi
    'background:#fff',
    'z-index:-1',
    'font-family:Segoe UI,Arial,sans-serif'
  ].join(';');

  // Extract only the <body> content from html string
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
  wrapper.innerHTML = bodyMatch ? bodyMatch[1] : html;
  document.body.appendChild(wrapper);

  // Let browser render
  await new Promise(r => setTimeout(r, 600));

  try {
    const canvas = await html2canvas(wrapper, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 794
    });

    document.body.removeChild(wrapper);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = doc.internal.pageSize.getWidth();   // 210 mm
    const pageH = doc.internal.pageSize.getHeight();  // 297 mm

    // Image dimensions in mm (maintain aspect ratio)
    const imgW = pageW;
    const imgH = (canvas.height / canvas.width) * pageW;

    let yOffset = 0;
    let pageCount = 0;

    while (yOffset < imgH) {
      if (pageCount > 0) doc.addPage();
      // Position image so current page slice is visible
      doc.addImage(
        canvas.toDataURL('image/jpeg', 0.92),
        'JPEG',
        0, -yOffset,   // x, y (negative y scrolls down into image)
        imgW, imgH
      );
      yOffset += pageH;
      pageCount++;
    }

    doc.save(`${fileName}.pdf`);

  } catch (err) {
    document.body.removeChild(wrapper);
    console.error('PDF-Fehler:', err);
    alert('PDF-Erstellung fehlgeschlagen. Bitte versuche es erneut.');
  } finally {
    pdfBtn.disabled = false;
    pdfBtn.textContent = '📄 PDF-Report herunterladen';
  }
}

function restart() {
  state = { userName: "", currentQ: 0, questions: [], answers: {}, phase: "core", topCandidates: [], results: null };
